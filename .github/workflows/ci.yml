name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      COINGECKO_DEMO_API_KEY: ci-demo-key
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build Next.js production app
        run: npm run build

      - name: Build OpenNext Cloudflare bundle
        run: npm run cf:build

      - name: Dry-run Wrangler deploy
        run: npx wrangler deploy --dry-run --outdir .wrangler-ci
